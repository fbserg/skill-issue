interface:
  display_name: "Issue Sweep"
  short_description: "Preflight, fix, and open PRs for eligible GitHub issues"
  default_prompt: "Use $issue-sweep to preflight the oldest eligible GitHub issues, escalate structural or ambiguous ones with a decision-needed comment, fix bounded issues in isolated worktrees, push issue branches, and open PRs. Do not merge unless I explicitly select the merge override for this run."
